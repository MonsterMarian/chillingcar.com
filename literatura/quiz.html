<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literární Test - Maturita</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradient"></div>
    <div class="stars-container" id="stars"></div>
    <div class="ember-container" id="embers"></div>

    <div class="container">
        <header>
            <div class="nav-back">
                <a href="../index.html" class="back-link">← Zpět na hlavní web</a>
            </div>
            <h1>Literární Test k maturitě</h1>
            
            <div class="mode-toggle">
                <button id="modeLiteratureBtn" class="work-btn active" onclick="setMode('literature')">Literatura</button>
                <button id="modeTheoryBtn" class="work-btn" onclick="setMode('theory')">Teorie</button>
            </div>

            <div class="stats">
                <span id="questionCounter">Otázka 1 z 0</span>
                <span id="score">Zodpovězeno: 0/0</span>
            </div>
        </header>

        <div class="work-selection" id="workSelection">
            <div class="preset-selection">
                <h3>Předvolby k maturitě:</h3>
                <div class="preset-buttons">
                    <button class="work-btn" onclick="selectPreset(['hamlet', 'romeo'])">Světová do 18. stol.</button>
                    <button class="work-btn" onclick="selectPreset(['orwell1984', 'farma', 'fahrenheit'])">Antiutopie</button>
                    <button class="work-btn" onclick="selectPreset(Object.keys(literatureData))">Vybrat vše</button>
                    <button class="work-btn reset-btn" onclick="selectPreset([])">Zrušit výběr</button>
                </div>
            </div>

            <h3 style="margin-top: 2rem;">Vyberte konkrétní díla:</h3>
            <div class="work-buttons" id="workButtonsContainer"></div>
        </div>

        <div class="category-selection" id="categorySelection">
            <h3>Vyberte okruhy:</h3>
            
            <div class="category-checkboxes" id="literatureCheckboxes">
                <label class="checkbox-label"><input type="checkbox" id="genreCheckbox" checked><span class="checkmark"></span>Žánr</label>
                <label class="checkbox-label"><input type="checkbox" id="authorCheckbox" checked><span class="checkmark"></span>Autor</label>
                <label class="checkbox-label"><input type="checkbox" id="authorDetailsCheckbox" checked><span class="checkmark"></span>Detaily autora</label>
                <label class="checkbox-label"><input type="checkbox" id="authorPeriodCheckbox" checked><span class="checkmark"></span>Doba autora</label>
                <label class="checkbox-label"><input type="checkbox" id="plotCheckbox" checked><span class="checkmark"></span>Děj a témata</label>
                <label class="checkbox-label"><input type="checkbox" id="charactersCheckbox" checked><span class="checkmark"></span>Postavy</label>
                <label class="checkbox-label"><input type="checkbox" id="styleCheckbox" checked><span class="checkmark"></span>Jazyk a styl</label>
            </div>

            <div class="category-checkboxes hidden" id="theoryCheckboxes">
                <label class="checkbox-label"><input type="checkbox" id="figuryCheckbox" checked><span class="checkmark"></span>Básnické figury</label>
                <label class="checkbox-label"><input type="checkbox" id="tropyCheckbox" checked><span class="checkmark"></span>Tropy</label>
                <label class="checkbox-label"><input type="checkbox" id="lexikologieCheckbox" checked><span class="checkmark"></span>Lexikologie</label>
                <label class="checkbox-label"><input type="checkbox" id="slovniDruhyCheckbox" checked><span class="checkmark"></span>Slovní druhy</label>
                <label class="checkbox-label"><input type="checkbox" id="slovniZasobaCheckbox" checked><span class="checkmark"></span>Slovní zásoba</label>
            </div>

            <button id="startTestBtn" class="start-test-btn">Spustit test</button>
        </div>

        <div class="controls hidden" id="controlsSection">
            <button id="allQuestionsBtn" class="control-btn active">Všechny</button>
            <button id="wrongQuestionsBtn" class="control-btn">Špatné</button>
            <button id="resetBtn" class="control-btn reset-btn">Reset</button>
            <button id="backToSelectionBtn" class="control-btn">Menu</button>
        </div>

        <div id="quizContainer" class="quiz-container hidden">
            <div class="question-card">
                <h2 id="questionText"></h2>
                <div id="answersContainer" class="answers-container"></div>
            </div>
            <div id="feedback" class="feedback hidden"></div>
            <div class="navigation">
                <button id="prevBtn" class="nav-btn" disabled>←</button>
                <button id="starBtn" class="nav-btn star-btn">★</button>
                <button id="nextBtn" class="nav-btn">→</button>
            </div>
        </div>

        <div id="completionScreen" class="completion-screen hidden">
            <h2>Test dokončen!</h2>
            <p id="finalScore"></p>
            <button id="restartBtn" class="restart-btn">Znovu</button>
        </div>
    </div>

    <script src="data/literature-data.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        // Star & Ember creation logic
        function createParticles() {
            const stars = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
                stars.appendChild(s);
            }
            const embers = document.getElementById('embers');
            for (let i = 0; i < 12; i++) {
                const e = document.createElement('div');
                e.className = 'ember-particle';
                e.style.left = Math.random() * 100 + '%';
                e.style.setProperty('--duration', (8 + Math.random() * 6) + 's');
                e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
                embers.appendChild(e);
            }
        }
        createParticles();
    </script>
</body>
</html>
