<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literatura - Rozcestník</title>
    <link rel="stylesheet" href="css/shared.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .main-title {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 50px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .menu-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        .card-icon {
            font-size: 3rem;
        }
        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .card-desc {
            color: var(--text-dim);
            line-height: 1.5;
        }
        .back-home {
            margin-top: 60px;
            display: inline-block;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .back-home:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="stars-container" id="stars"></div>
    <div class="ember-container" id="embers"></div>

    <div class="container">
        <header>
            <h1 class="main-title gradient-text">Literatura</h1>
            <p class="subtitle">Vyberte si režim učení pro maturitu</p>
        </header>

        <div class="menu-grid">
            <a href="quiz.html" class="menu-card">
                <div class="card-icon">📝</div>
                <div class="card-title">Literární Test</div>
                <div class="card-desc">Otestujte své znalosti 20 povinných děl v interaktivním kvízu.</div>
            </a>
            
            <a href="cards.html" class="menu-card">
                <div class="card-icon">🎴</div>
                <div class="card-title">Kartičky</div>
                <div class="card-desc">Učte se pomocí flashcards – autoři, období a hlavní myšlenky děl.</div>
            </a>
        </div>

        <a href="../index.html" class="back-home">← Zpět na hlavní web ChillingCar</a>
    </div>

    <script>
        // Particle logic
        const stars = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--duration', (2 + Math.random() * 3) + 's'); stars.appendChild(s);
        }
        const embers = document.getElementById('embers');
        for (let i = 0; i < 12; i++) {
            const e = document.createElement('div'); e.className = 'ember-particle';
            e.style.left = Math.random() * 100 + '%'; e.style.setProperty('--duration', (8 + Math.random() * 6) + 's');
            e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px'); embers.appendChild(e);
        }
    </script>
</body>
</html>
