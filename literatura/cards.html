<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literatura - Kartičky</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/cards.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="stars-container" id="stars"></div>
    <div class="ember-container" id="embers"></div>

    <header>
        <div class="nav-back" style="padding: 10px;">
            <a href="index.html" class="back-link" style="color: white; text-decoration: none;">← Zpět</a>
        </div>
        <div class="logo">
            <span class="gradient-text">Lit</span>Cards
        </div>
    </header>

    <main>
        <section id="view-study" class="view active">
            <div class="controls">
                <button id="open-filters-btn" class="action-btn"><i data-lucide="sliders-horizontal"></i> Filtry</button>
                <button id="shuffle-btn" class="action-btn"><i data-lucide="shuffle"></i> Zamíchat</button>
                <div class="deck-stats">Karet: <span id="total-cards-badge">0</span></div>
            </div>

            <div id="filter-panel" class="filter-panel">
                <div class="filter-content">
                    <div class="filter-header">
                        <h3 class="gradient-text">Filtry</h3>
                        <button id="close-filters-btn" class="close-btn">&times;</button>
                    </div>
                    <div class="filter-section">
                        <div class="checkbox-grid">
                            <label class="checkbox-wrapper"><input type="checkbox" id="type-authors-works" checked><span class="checkbox-tile"><span class="tile-label">Autoři a díla</span></span></label>
                            <label class="checkbox-wrapper"><input type="checkbox" id="type-eras-years" checked><span class="checkbox-tile"><span class="tile-label">Období a roky</span></span></label>
                            <label class="checkbox-wrapper"><input type="checkbox" id="type-everything" checked><span class="checkbox-tile"><span class="tile-label">Ostatní info</span></span></label>
                        </div>
                    </div>
                    <button id="apply-filters-btn" class="btn primary full-width">Spustit</button>
                </div>
            </div>
            
            <div class="flashcard-container">
                <button id="prev-btn" class="nav-btn">&larr;</button>
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-inner" id="flashcard-inner">
                        <div class="flashcard-front">
                            <span id="card-type-badge-front" class="badge top-badge">...</span>
                            <h2 id="card-front-prompt">...</h2>
                        </div>
                        <div class="flashcard-back">
                            <span id="card-type-badge-back" class="badge top-badge">Odpověď</span>
                            <div class="answer-content"><h2 class="gradient-text" id="card-back-answer">...</h2></div>
                        </div>
                    </div>
                </div>
                <button id="next-btn" class="nav-btn">&rarr;</button>
            </div>
            <div class="progress"><span id="study-progress-text">1 / 10</span></div>
        </section>
    </main>

    <script src="data/cards-data.js"></script>
    <script src="js/cards.js"></script>
    <script>
        lucide.createIcons();
        // Particle logic (same as quiz)
        const stars = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--duration', (2 + Math.random() * 3) + 's'); stars.appendChild(s);
        }
        const embers = document.getElementById('embers');
        for (let i = 0; i < 12; i++) {
            const e = document.createElement('div'); e.className = 'ember-particle';
            e.style.left = Math.random() * 100 + '%'; e.style.setProperty('--duration', (8 + Math.random() * 6) + 's');
            e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px'); embers.appendChild(e);
        }
    </script>
</body>
</html>
